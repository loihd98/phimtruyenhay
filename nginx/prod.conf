########################################################
# HTTP: redirect all to HTTPS + Let's Encrypt challenge
########################################################
server {
    listen 80;
    server_name phimtruyenhay.com www.phimtruyenhay.com vivutruyenhay.com www.vivutruyenhay.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

########################################################
# HTTPS: redirect www -> non-www
########################################################
server {
    listen 443 ssl;
    http2 on;
    server_name www.phimtruyenhay.com;

    ssl_certificate /etc/letsencrypt/live/phimtruyenhay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phimtruyenhay.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://phimtruyenhay.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.vivutruyenhay.com;

    ssl_certificate /etc/letsencrypt/live/vivutruyenhay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vivutruyenhay.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://vivutruyenhay.com$request_uri;
}

########################################################
# HTTPS: main domain (non-www) - phimtruyenhay.com
########################################################
server {
    listen 443 ssl;
    http2 on;
    server_name phimtruyenhay.com;

    ssl_certificate /etc/letsencrypt/live/phimtruyenhay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phimtruyenhay.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Allow large file uploads (audio files up to 1.5GB)
    client_max_body_size 2g;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag "index, follow" always;

    # API backend
    location /api/ {
        limit_req zone=api burst=300 nodelay;
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Don't cache API responses
        add_header Cache-Control "no-store";
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js static assets (immutable)
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static uploads (images, audio)
    location ^~ /uploads/ {
        alias /uploads/;
        autoindex off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Audio/video range request support for served uploads
    location ~* /uploads/.*\.(mp3|mp4|wav|ogg|m4a|aac|flac)$ {
        alias /uploads/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=86400";
    }

    # API backend — large file uploads
    location ~* ^/api/(admin/)?media/upload(/audio|/image)? {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_request_buffering off;
        add_header Cache-Control "no-store";
    }

    # Favicon / icons - cache aggressively
    location ~* \.(ico|svg|png|webp)$ {
        proxy_pass http://frontend:3000;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
}

