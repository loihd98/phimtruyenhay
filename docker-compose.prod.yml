services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    restart: unless-stopped
    volumes:
      - ./uploads:/uploads
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node src/index.js"
    healthcheck:
      test: ["CMD", "node", "src/scripts/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_OPTIONS=--max-old-space-size=2048
        - NODE_ENV=production
        - NEXT_PUBLIC_API_URL=https://themidnightmoviereel.io.vn/api
        - NEXT_PUBLIC_BASE_URL=https://themidnightmoviereel.io.vn
        - NEXT_PUBLIC_MEDIA_URL=https://themidnightmoviereel.io.vn
    restart: unless-stopped
    volumes:
      - ./uploads:/app/public/uploads:ro
    env_file:
      - .env.prod
    environment:
      - NODE_OPTIONS=--max-old-space-size=1024
      - PORT=3000
      - API_URL=http://backend:5000/api
      - MEDIA_URL_INTERNAL=http://nginx
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./uploads:/uploads:ro
      - ./logs/nginx:/var/log/nginx
      - certbot-web:/var/www/certbot:rw
      - certbot-certs:/etc/letsencrypt:rw
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    environment:
      - DOMAIN=themidnightmoviereel.io.vn
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - app-network

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-web:/var/www/certbot:rw
      - certbot-certs:/etc/letsencrypt:rw
    networks:
      - app-network

volumes:
  postgres_data:
  certbot-web:
  certbot-certs:

networks:
  app-network:
    driver: bridge
