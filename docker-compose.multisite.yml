# Multi-site deployment - use this instead of docker-compose.prod.yml
# when running multiple websites on the same VPS.
#
# Prerequisites:
#   docker network create gateway-network
#
# Usage:
#   docker compose -f docker-compose.multisite.yml up -d --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: vivutruyenhay-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: vivutruyenhay-backend
    restart: unless-stopped
    volumes:
      - ./uploads:/uploads
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node src/index.js"
    healthcheck:
      test: ["CMD", "node", "src/scripts/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - internal
      - gateway-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_OPTIONS=--max-old-space-size=2048
        - NODE_ENV=production
        - NEXT_PUBLIC_API_URL=https://themidnightmoviereel.io.vn/api
        - NEXT_PUBLIC_BASE_URL=https://themidnightmoviereel.io.vn
        - NEXT_PUBLIC_MEDIA_URL=https://themidnightmoviereel.io.vn
    container_name: vivutruyenhay-frontend
    restart: unless-stopped
    volumes:
      - ./uploads:/app/public/uploads:ro
    env_file:
      - .env.prod
    environment:
      - NODE_OPTIONS=--max-old-space-size=1024
      - PORT=3000
      - API_URL=http://vivutruyenhay-backend:5000/api
      - MEDIA_URL_INTERNAL=http://nginx-gateway
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - internal
      - gateway-network

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  gateway-network:
    external: true
